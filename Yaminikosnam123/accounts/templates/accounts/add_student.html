<!DOCTYPE html>
<html>
<head>
<title>Add Student</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#FDF6ED;min-height:100vh;}
nav{background:#7B1C2E;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;}
nav h1{color:white;font-size:18px;}
nav a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;}
.container{max-width:600px;margin:40px auto;padding:0 24px;}
.card{background:white;border-radius:16px;padding:40px;box-shadow:0 4px 24px rgba(123,28,46,0.08);border-top:4px solid #7B1C2E;}
h2{font-size:22px;color:#1a0a0f;margin-bottom:24px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
input,select{width:100%;padding:12px;border:1.5px solid #d9bcc5;border-radius:8px;font-size:14px;outline:none;}
input:focus,select:focus{border-color:#7B1C2E;}
.btn{width:100%;padding:13px;background:#7B1C2E;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn:hover{background:#a52840;}
.alert-success{background:#f0fdf4;border-left:4px solid #1e7e34;color:#1e7e34;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;}
</style>
</head>
<body>
<nav>
<h1>🎓 KGWC Mentor System</h1>
<a href="/dashboard">← Back to Dashboard</a>
</nav>
<div class="container">
<div class="card">
<h2>Add New Student</h2>
{% if messages %}{% for m in messages %}<div class="alert-{{m.tags}}">{{m}}</div>{% endfor %}{% endif %}
<form method="POST">
{% csrf_token %}
<div class="form-group">
<label>Full Name</label>
<input type="text" name="full_name" placeholder="Enter student full name" required/>
</div>
<div class="form-group">
<label>Roll Number</label>
<input type="text" name="roll_no" placeholder="e.g. 2021CS001" required/>
</div>
<div class="form-group">
<label>Department</label>
<select name="department" required>
<option value="" disabled selected>Select department</option>
<option>Computer Science</option>
<option>Mathematics</option>
<option>Physics</option>
<option>Chemistry</option>
<option>English</option>
<option>Tamil</option>
<option>Commerce</option>
<option>Economics</option>
<option>Zoology</option>
<option>Botany</option>
</select>
</div>
<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="student@email.com" required/>
</div>
<div class="form-group">
<label>Phone Number</label>
<input type="text" name="phone" placeholder="+91 9876543210" required/>
</div>
<div class="form-group">
<label>Student Type</label>
<select name="student_type" required>
<option value="" disabled selected>Select graduation type</option>
<option value="degree">Degree</option>
<option value="pg">Post Graduation (PG)</option>
</select>
</div>
<button class="btn" type="submit">Add Student</button>
</form>
</div>
</div>
</body>
</html>
