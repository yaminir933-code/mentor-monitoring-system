<!DOCTYPE html>
<html>
<head>
<title>Add Higher Studies</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; background: #f0f2f5; }
.navbar { background: #9C27B0; padding: 1rem 2rem; color: white; display: flex; justify-content: space-between; align-items: center; }
.navbar a { color: white; text-decoration: none; }
.container { padding: 2rem; max-width: 700px; margin: auto; }
.form-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.form-title { color: #9C27B0; font-size: 1.4rem; margin-bottom: 0.3rem; }
.form-subtitle { color: #777; font-size: 0.9rem; margin-bottom: 2rem; }
.section-title { color: #9C27B0; font-weight: bold; margin: 1.5rem 0 1rem; border-bottom: 2px solid #f3e5f5; padding-bottom: 0.5rem; }
.form-group { margin-bottom: 1.2rem; }
label { display: block; color: #555; font-weight: bold; margin-bottom: 0.4rem; font-size: 0.9rem; }
input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; font-family: Arial; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #9C27B0; }
textarea { height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.btn-save { background: #9C27B0; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
.error { background: #ffebee; color: #c62828; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
.success { background: #e8f5e9; color: #2e7d32; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="navbar">
  <span>🎓 MentorApp</span>
  <a href="/career/profile/{{ student.id }}">← Back</a>
</div>
<div class="container">
  <div class="form-card">
    <div class="form-title">🎓 Add Higher Studies Record</div>
    <div class="form-subtitle">Student: <b>{{ student.name }}</b> | {{ student.department }}</div>
    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
    {% if success %}<div class="success">✅ {{ success }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="section-title">🎯 Goal Details</div>
      <div class="form-row">
        <div class="form-group">
          <label>Goal Type *</label>
          <select name="goal_type" required>
            <option value="">-- Select Goal --</option>
            <option value="MSc">MSc</option>
            <option value="MTech">MTech</option>
            <option value="MBA">MBA</option>
            <option value="PhD">PhD</option>
            <option value="UPSC">UPSC - Civil Services</option>
            <option value="GATE">GATE</option>
            <option value="GRE">GRE - Abroad Studies</option>
            <option value="Other_Exam">Other Competitive Exam</option>
          </select>
        </div>
        <div class="form-group">
          <label>Interest Area *</label>
          <input type="text" name="interest_area" placeholder="e.g. Data Science, AI" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Target Institution</label>
          <input type="text" name="target_institution" placeholder="e.g. IIT, NIT, MIT">
        </div>
        <div class="form-group">
          <label>Progress Status</label>
          <select name="progress_status">
            <option value="Not Started">Not Started</option>
            <option value="Preparing">Preparing</option>
            <option value="Applied">Applied</option>
            <option value="Exam Cleared">Exam Cleared</option>
            <option value="Admission Received">Admission Received</option>
            <option value="Enrolled">Enrolled</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Preparation Level (0-100%)</label>
          <input type="number" name="preparation_level" min="0" max="100" placeholder="0-100" value="0">
        </div>
        <div class="form-group">
          <label>Exam Score</label>
          <input type="text" name="exam_score" placeholder="e.g. GATE 750, GRE 320">
        </div>
      </div>
      <div class="section-title">📋 Guidance</div>
      <div class="form-group">
        <label>Guidance Plan</label>
        <textarea name="guidance_plan" placeholder="Guidance plan for the student..."></textarea>
      </div>
      <div class="form-group">
        <label>Resources Provided</label>
        <textarea name="resources_provided" placeholder="Books, links, materials provided..."></textarea>
      </div>
      <button class="btn-save" type="submit">💾 Save Record</button>
    </form>
  </div>
</div>
</body>
</html>
