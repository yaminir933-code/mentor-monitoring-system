<!DOCTYPE html>
<html>
<head>
<title>Set Career Path</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; background: #f0f2f5; }
.navbar { background: #9C27B0; padding: 1rem 2rem; color: white; display: flex; justify-content: space-between; align-items: center; }
.navbar a { color: white; text-decoration: none; }
.container { padding: 2rem; max-width: 700px; margin: auto; }
.form-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.form-title { color: #9C27B0; font-size: 1.4rem; margin-bottom: 0.3rem; }
.form-subtitle { color: #777; font-size: 0.9rem; margin-bottom: 2rem; }
.path-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.path-card { border: 2px solid #ddd; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; }
.path-card:hover { border-color: #9C27B0; background: #f3e5f5; }
.path-card input { display: none; }
.path-card.selected { border-color: #9C27B0; background: #f3e5f5; }
.path-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.path-label { font-weight: bold; color: #333; font-size: 0.9rem; }
.form-group { margin-bottom: 1.2rem; }
label { display: block; color: #555; font-weight: bold; margin-bottom: 0.4rem; }
input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; }
input:focus { outline: none; border-color: #9C27B0; }
.btn-save { background: #9C27B0; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
.error { background: #ffebee; color: #c62828; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="navbar">
  <span>🎓 MentorApp</span>
  <a href="/career/profile/{{ student.id }}">← Back</a>
</div>
<div class="container">
  <div class="form-card">
    <div class="form-title">⚙️ Set Career Path</div>
    <div class="form-subtitle">Student: <b>{{ student.name }}</b> | {{ student.department }}</div>
    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="path-options">
        <label class="path-card {% if profile and profile.career_path == 'higher_studies' %}selected{% endif %}">
          <input type="radio" name="career_path" value="higher_studies" {% if profile and profile.career_path == 'higher_studies' %}checked{% endif %}>
          <div class="path-icon">🎓</div>
          <div class="path-label">Higher Studies</div>
        </label>
        <label class="path-card {% if profile and profile.career_path == 'job_placement' %}selected{% endif %}">
          <input type="radio" name="career_path" value="job_placement" {% if profile and profile.career_path == 'job_placement' %}checked{% endif %}>
          <div class="path-icon">💼</div>
          <div class="path-label">Job Placement</div>
        </label>
        <label class="path-card {% if profile and profile.career_path == 'undecided' %}selected{% endif %}">
          <input type="radio" name="career_path" value="undecided" {% if profile and profile.career_path == 'undecided' %}checked{% endif %}>
          <div class="path-icon">❓</div>
          <div class="path-label">Undecided</div>
        </label>
      </div>
      <div class="form-group">
        <label>📱 Student Mobile Number</label>
        <input type="text" name="mobile_number" value="{% if profile %}{{ profile.mobile_number }}{% endif %}" placeholder="Enter student mobile number">
      </div>
      <button class="btn-save" type="submit">💾 Save Career Path</button>
    </form>
  </div>
</div>
</body>
</html>
