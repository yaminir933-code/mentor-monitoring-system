<!DOCTYPE html>
<html>
<head>
<title>Delete Record</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
.box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
h2 { color: #333; margin-bottom: 1rem; }
p { color: #777; margin-bottom: 1.5rem; }
.btn-yes { background: #e53935; color: white; padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
.btn-no { background: #9C27B0; color: white; padding: 10px 24px; border-radius: 6px; text-decoration: none; }
</style>
</head>
<body>
<div class="box">
  <h2>⚠️ Delete Record?</h2>
  <p>Are you sure you want to delete this record? This cannot be undone!</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn-yes" type="submit">Yes, Delete</button>
    {% if type == 'higher' %}
    <a class="btn-no" href="/career/profile/{{ record.profile.student.id }}">No, Cancel</a>
    {% else %}
    <a class="btn-no" href="/career/profile/{{ record.profile.student.id }}">No, Cancel</a>
    {% endif %}
  </form>
</div>
</body>
</html>
