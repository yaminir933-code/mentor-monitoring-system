<!DOCTYPE html>
<html>
<head>
<title>Add Placement Record</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; background: #f0f2f5; }
.navbar { background: #9C27B0; padding: 1rem 2rem; color: white; display: flex; justify-content: space-between; align-items: center; }
.navbar a { color: white; text-decoration: none; }
.container { padding: 2rem; max-width: 700px; margin: auto; }
.form-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.form-title { color: #9C27B0; font-size: 1.4rem; margin-bottom: 0.3rem; }
.form-subtitle { color: #777; font-size: 0.9rem; margin-bottom: 2rem; }
.section-title { color: #9C27B0; font-weight: bold; margin: 1.5rem 0 1rem; border-bottom: 2px solid #f3e5f5; padding-bottom: 0.5rem; }
.form-group { margin-bottom: 1.2rem; }
label { display: block; color: #555; font-weight: bold; margin-bottom: 0.4rem; font-size: 0.9rem; }
input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; font-family: Arial; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #9C27B0; }
textarea { height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.btn-save { background: #9C27B0; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
.error { background: #ffebee; color: #c62828; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
.success { background: #e8f5e9; color: #2e7d32; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
.placed-section { display: none; }
</style>
</head>
<body>
<div class="navbar">
  <span>🎓 MentorApp</span>
  <a href="/career/profile/{{ student.id }}">← Back</a>
</div>
<div class="container">
  <div class="form-card">
    <div class="form-title">💼 Add Placement Record</div>
    <div class="form-subtitle">Student: <b>{{ student.name }}</b> | {{ student.department }}</div>
    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
    {% if success %}<div class="success">✅ {{ success }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="section-title">📊 Placement Status</div>
      <div class="form-group">
        <label>Placement Status *</label>
        <select name="placement_status" onchange="checkPlaced(this)" required>
          <option value="Searching">🔍 Searching</option>
          <option value="Applied">📝 Applied</option>
          <option value="Interview Stage">🎤 Interview Stage</option>
          <option value="Offer Received">📨 Offer Received</option>
          <option value="Placed">✅ Placed</option>
          <option value="Still Looking">⏳ Still Looking</option>
        </select>
      </div>
      <div class="section-title">🏢 Placement Office & Interviews</div>
      <div class="form-row">
        <div class="form-group">
          <label>Placement Office Visits</label>
          <input type="number" name="placement_office_visits" min="0" placeholder="No. of visits" value="0">
        </div>
        <div class="form-group">
          <label>Interviews Attended</label>
          <input type="number" name="interviews_attended" min="0" placeholder="No. of interviews" value="0">
        </div>
      </div>
      <div class="form-group">
        <label>Interviews Cleared</label>
        <input type="number" name="interviews_cleared" min="0" placeholder="No. of interviews cleared" value="0">
      </div>
      <div class="placed-section" id="placedSection">
        <div class="section-title">🎉 Job Details (if Placed)</div>
        <div class="form-row">
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" name="company_name" placeholder="e.g. TCS, Infosys">
          </div>
          <div class="form-group">
            <label>Job Role</label>
            <input type="text" name="job_role" placeholder="e.g. Software Engineer">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Salary (CTC)</label>
            <input type="text" name="salary" placeholder="e.g. 6 LPA">
          </div>
          <div class="form-group">
            <label>Job Location</label>
            <input type="text" name="job_location" placeholder="e.g. Bangalore">
          </div>
        </div>
        <div class="form-group">
          <label>Offer Date</label>
          <input type="date" name="offer_date">
        </div>
      </div>
      <div class="section-title">📝 Guidance</div>
      <div class="form-group">
        <label>Guidance Notes</label>
        <textarea name="guidance_notes" placeholder="Guidance provided to student..."></textarea>
      </div>
      <button class="btn-save" type="submit">💾 Save Record</button>
    </form>
  </div>
</div>
<script>
function checkPlaced(select) {
  const placedSection = document.getElementById('placedSection');
  if (select.value === 'Placed' || select.value === 'Offer Received') {
    placedSection.style.display = 'block';
  } else {
    placedSection.style.display = 'none';
  }
}
</script>
</body>
</html>
