<!DOCTYPE html>
<html>
<head>
<title>Edit Profile - MentorApp</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background: #f5f7fa;
}

.navbar {
  background: white;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.navbar a {
  color: #1a237e;
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  transition: all 0.3s ease;
}

.navbar a:hover { background: #f5f7fa; }

.container { 
  padding: 2.5rem 2rem; 
  max-width: 600px; 
  margin: auto; 
}

h2 {
  color: #2c3e50;
  margin-bottom: 2rem;
  font-size: 1.5rem;
}

.form-card {
  background: white;
  border-radius: 12px;
  padding: 2rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.form-group {
  margin-bottom: 1.5rem;
}

label {
  display: block;
  color: #2c3e50;
  font-weight: 600;
  margin-bottom: 0.5rem;
  font-size: 0.95rem;
}

input, textarea, select {
  width: 100%;
  padding: 0.8rem 1rem;
  border: 2px solid #ecf0f1;
  border-radius: 8px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  color: #2c3e50;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #1a237e;
  box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

.button-group {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
}

button, .btn {
  flex: 1;
  padding: 0.9rem 1.5rem;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.btn-primary {
  background: #1a237e;
  color: white;
}

.btn-primary:hover {
  background: #283593;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(26, 35, 126, 0.2);
}

.btn-secondary {
  background: #ecf0f1;
  color: #2c3e50;
}

.btn-secondary:hover {
  background: #d5dbdb;
  transform: translateY(-2px);
}

.alert {
  padding: 1rem 1.5rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  font-weight: 500;
}

.alert-success {
  background: #d5f4e6;
  color: #27AE60;
  border-left: 4px solid #27AE60;
}

.alert-error {
  background: #fadbd8;
  color: #E74C3C;
  border-left: 4px solid #E74C3C;
}

.info-box {
  background: #eef5e9;
  padding: 1rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  border-left: 4px solid #27AE60;
  color: #2c3e50;
  font-size: 0.9rem;
}

@media (max-width: 768px) {
  .form-row {
    grid-template-columns: 1fr;
  }
  
  .button-group {
    flex-direction: column;
  }
  
  .container { padding: 1.5rem 1rem; }
}
</style>
</head>
<body>

<div class="navbar">
  <a href="/dashboard/" title="Back to Dashboard">
    <i class="fas fa-arrow-left"></i> Back to Dashboard
  </a>
  <span style="font-weight: 600; color: #1a237e;">👤 Edit Profile</span>
  <div></div>
</div>

<div class="container">
  <h2><i class="fas fa-user-edit"></i> Edit Your Profile</h2>
  
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  {% if error %}
    <div class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
  {% endif %}

  <div class="form-card">
    <form method="POST">
      {% csrf_token %}
      
      <div class="info-box">
        <i class="fas fa-info-circle"></i> Update your profile information below. Username cannot be changed.
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{ user.username }}" readonly style="background: #ecf0f1; cursor: not-allowed;">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" placeholder="Enter your email address" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="first_name">First Name</label>
          <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" placeholder="Enter your first name">
        </div>

        <div class="form-group">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" placeholder="Enter your last name">
        </div>
      </div>

      <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="">Select your department</option>
          <option value="Computer Science" {% if profile.department == 'Computer Science' %}selected{% endif %}>Computer Science</option>
          <option value="Information Technology" {% if profile.department == 'Information Technology' %}selected{% endif %}>Information Technology</option>
          <option value="Electronics" {% if profile.department == 'Electronics' %}selected{% endif %}>Electronics</option>
          <option value="Mechanical" {% if profile.department == 'Mechanical' %}selected{% endif %}>Mechanical</option>
          <option value="Civil" {% if profile.department == 'Civil' %}selected{% endif %}>Civil</option>
          <option value="Electrical" {% if profile.department == 'Electrical' %}selected{% endif %}>Electrical</option>
          <option value="Chemical" {% if profile.department == 'Chemical' %}selected{% endif %}>Chemical</option>
          <option value="Biotechnology" {% if profile.department == 'Biotechnology' %}selected{% endif %}>Biotechnology</option>
          <option value="Other" {% if profile.department == 'Other' %}selected{% endif %}>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" value="{{ profile.phone }}" placeholder="Enter your phone number">
      </div>

      <div class="button-group">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Save Changes
        </button>
        <a href="/dashboard/" class="btn btn-secondary">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
